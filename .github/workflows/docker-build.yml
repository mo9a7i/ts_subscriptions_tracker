name: Build and Push Docker Image

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
    paths-ignore:
      - 'k8s/**'
      - 'docs/**'
      - '*.md'
      - 'README.md'
      - 'CONTRIBUTING.md'
      - 'LICENSE'
      - '.gitignore'
      - '.dockerignore'
      - 'docker-compose.yml'
      - 'docker-compose.*.yml'
      - '.vscode/**'
      - '.cursor/**'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/pull_request_template.md'
      - '**/*.example'
      - 'scripts/**'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - 'k8s/**'
      - 'docs/**'
      - '*.md'
      - 'README.md'
      - 'CONTRIBUTING.md'
      - 'LICENSE'
      - '.gitignore'
      - '.dockerignore'
      - 'docker-compose.yml'
      - 'docker-compose.*.yml'
      - '.vscode/**'
      - '.cursor/**'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/pull_request_template.md'
      - '**/*.example'
      - 'scripts/**'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push Docker image
      id: build
      uses: docker/build-push-action@v5
      with:
        context: .
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        platforms: linux/amd64
        build-args: |
          NEXT_PUBLIC_HEXCLAVE_API_URL=https://sso.6degrees.com.sa
          NEXT_PUBLIC_HEXCLAVE_PROJECT_ID=78eb5b0b-9e83-41ea-9622-6d940fe7cec6
          NEXT_PUBLIC_HEXCLAVE_PUBLISHABLE_CLIENT_KEY=pck_sr95fcpz1eqtzvn77z3pvz7m7q31sfgthnycfnnr3vq2g
        cache-from: type=gha
        cache-to: type=gha,mode=max